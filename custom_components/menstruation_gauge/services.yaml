      required: false
      example: "sensor.anna"
      selector:
        entity:
          domain: sensor
    profile:
      required: false
      example: "anna"
      selector:
        text:
    entry_id:
      required: false
      example: "a1b2c3d4e5f6..."
      selector:
        text:
    is_menarche:
      required: true
      example: false
      description: Set to false to enable pre-menarche tracking, true when menarche has occurred.
      selector:
        boolean:
    estimated_menarche_date:
      required: false
      example: "2026-12-01"
      description: Estimated date when menarche is expected (YYYY-MM-DD).
      selector:
        text:
    family_menarche_age:
      required: false
      example: 12
      description: Age of menarche in the family (e.g. mother, sister), used for estimation.
      selector:
        number:
          min: 9
          max: 16
          mode: box

update_menarche_date:
