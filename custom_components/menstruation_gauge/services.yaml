set_pregnancy_mode:
  name: Set pregnancy mode
  description: Enable or disable pregnancy mode. When enabled, the sensor reports pregnancy state with weeks pregnant and due date.
  fields:
    entity_id:
      required: false
      example: "sensor.anna"
      selector:
        entity:
          domain: sensor
    profile:
      required: false
      example: "anna"
      selector:
        text:
    entry_id:
      required: false
      example: "a1b2c3d4e5f6..."
      selector:
        text:
    is_pregnant:
      required: true
      example: true
      description: Set to true to enable pregnancy mode, false to disable.
      selector:
        boolean:
    pregnancy_start_date:
      required: false
      example: "2026-01-15"
      description: First day of last menstrual period (YYYY-MM-DD). Defaults to last known period start.
      selector:
        text:

update_pregnancy_date:
