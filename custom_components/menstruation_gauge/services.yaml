      required: false
      example: "anna"
      selector:
        text:
    entry_id:
      required: false
      example: "a1b2c3d4e5f6..."
      selector:
        text:
    date:
      required: true
      example: "2026-03-15"
      description: Date in YYYY-MM-DD format
      selector:
        text:

get_symptom:
