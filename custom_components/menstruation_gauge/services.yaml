add_pre_menarche_sign:
  name: Add pre-menarche body sign
  description: Record or update a puberty body sign for pre-menarche tracking (Tanner stage classification).
  fields:
    entity_id:
      required: false
      example: "sensor.anna"
      selector:
        entity:
          domain: sensor
    profile:
      required: false
      example: "anna"
      selector:
        text:
    entry_id:
      required: false
      example: "a1b2c3d4e5f6..."
      selector:
        text:
    pre_menarche_sign:
      required: true
      example: "breast_development"
      description: The puberty sign to record.
      selector:
        select:
          options:
            - "pubic_hair_growth"
            - "breast_development"
            - "height_spurt"
            - "mood_changes"
            - "acne"
            - "body_odor"
            - "vaginal_discharge"
    tanner_stage:
      required: true
      example: "stage_2"
      description: Current stage or level for the selected sign.
      selector:
        text:

remove_pre_menarche_sign:
