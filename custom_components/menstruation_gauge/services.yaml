add_cycle_start:
  name: Add cycle start day
  description: Add one confirmed bleeding day in YYYY-MM-DD format.
  fields:
    entity_id:
      required: false
      example: "sensor.anna_zyklus"
      selector:
        entity:
          domain: sensor
    profile:
      required: false
      example: "anna"
      selector:
        text:
    entry_id:
      required: false
      example: "a1b2c3d4e5f6..."
      selector:
        text:
    date:
      required: true
      example: "2026-03-01"
      selector:
        text:

remove_cycle_start:
  name: Remove cycle start day
  description: Remove one confirmed bleeding day in YYYY-MM-DD format.
  fields:
    entity_id:
      required: false
      example: "sensor.anna_zyklus"
      selector:
        entity:
          domain: sensor
    profile:
      required: false
      example: "anna"
      selector:
        text:
    entry_id:
      required: false
      example: "a1b2c3d4e5f6..."
      selector:
        text:
    date:
      required: true
      example: "2026-03-01"
      selector:
        text:

set_cycle_history:
  name: Replace full cycle history
  description: Replace complete confirmed bleeding history with a list of dates.
  fields:
    entity_id:
      required: false
      example: "sensor.anna_zyklus"
      selector:
        entity:
          domain: sensor
    profile:
      required: false
      example: "anna"
      selector:
        text:
    entry_id:
      required: false
      example: "a1b2c3d4e5f6..."
      selector:
        text:
    dates:
      required: true
      example:
        - "2026-01-14"
        - "2026-02-14"
      selector:
        object:

set_period_duration:
  name: Set period duration days
  description: Set forecasted period duration (used for card markers).
  fields:
    entity_id:
      required: false
      example: "sensor.anna_zyklus"
      selector:
        entity:
          domain: sensor
    profile:
      required: false
      example: "anna"
      selector:
        text:
    entry_id:
      required: false
      example: "a1b2c3d4e5f6..."
      selector:
        text:
    days:
      required: true
      example: 5
      selector:
        number:
          min: 1
          max: 14
          mode: box

erase_all_history:
  name: Erase all cycle history
  description: |
    Destructive action. Deletes the complete stored history.
    Safety checks:
    - works only when `erase_all` is exactly `true`
    - requires explicit `entity_id` (sensor id)
    This helps prevent accidental destructive calls (e.g. shell command without target).
  fields:
    entity_id:
      required: true
      example: "sensor.anna_zyklus"
      selector:
        entity:
          domain: sensor
    profile:
      required: false
      example: "anna"
      selector:
        text:
    entry_id:
      required: false
      example: "a1b2c3d4e5f6..."
      selector:
        text:
    erase_all:
      required: true
      example: true
      selector:
        boolean:

export_history:
  name: Export cycle history
  description: |
    Exports the current history to a local file.
    Files are written to `<config>/menstruation_gauge_exports/`.
    Supported formats: `csv`, `txt`.
  fields:
    entity_id:
      required: false
      example: "sensor.anna_zyklus"
      selector:
        entity:
          domain: sensor
    profile:
      required: false
      example: "anna"
      selector:
        text:
    entry_id:
      required: false
      example: "a1b2c3d4e5f6..."
      selector:
        text:
    format:
      required: false
      example: "csv"
      selector:
        select:
          options:
            - "csv"
            - "txt"
    filename:
      required: false
      example: "my_cycle_backup"
      selector:
        text:

refresh_cycle_model:
  name: Refresh cycle model
  description: Recalculate all date-based sensor values, including days until next predicted start.
  fields:
    entity_id:
      required: false
      example: "sensor.anna_zyklus"
      selector:
        entity:
          domain: sensor
    profile:
      required: false
      example: "anna"
      selector:
        text:
    entry_id:
      required: false
      example: "a1b2c3d4e5f6..."
      selector:
        text:

log_product_usage:
  name: Log product usage
  description: Log tampon, pad, cup, or liner usage for statistics and timer integrations.
  fields:
    entity_id:
      required: false
      example: "sensor.anna"
      selector:
        entity:
          domain: sensor
    profile:
      required: false
      example: "anna"
      selector:
        text:
    entry_id:
      required: false
      example: "a1b2c3d4e5f6..."
      selector:
        text:
    product:
      required: true
      example: "tampon"
      selector:
        select:
          options:
            - "tampon"
            - "pad"
            - "cup"
            - "underwear"
            - "liner"
    action:
      required: false
      example: "used"
      selector:
        select:
          options:
            - "used"
            - "emptied"
    quantity:
      required: false
      example: 1
      selector:
        number:
          min: 1
          max: 50
          mode: box
    date:
      required: false
      example: "2026-07-15"
      description: Optional backfill date in YYYY-MM-DD format. Defaults to today.
      selector:
        text:

add_symptom:
  name: Add or update symptom data for a date
  description: Add or update symptom data for a specific date. Data is merged with existing entries.
  fields:
    entity_id:
      required: false
      example: "sensor.anna"
      selector:
        entity:
          domain: sensor
    profile:
      required: false
      example: "anna"
      selector:
        text:
    entry_id:
      required: false
      example: "a1b2c3d4e5f6..."
      selector:
        text:
    date:
      required: true
      example: "2026-03-15"
      description: Date in YYYY-MM-DD format
      selector:
        text:
    symptom_data:
      required: true
      description: Dictionary with symptom fields. Optional fields - bleeding_strength, spotting, intercourse, pain (list), basal_temp (number), hygiene (list), test
      selector:
        object:

remove_symptom:
  name: Remove symptom data for a date
  description: Remove all symptom data for a specific date.
  fields:
    entity_id:
      required: false
      example: "sensor.anna"
      selector:
